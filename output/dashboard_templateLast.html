<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TotoFra Dashboard</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        h1 { color: #333; }
        .match { background: white; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
        .prob { font-size: 14px; color: #555; }
    </style>
</head>
<body>

<h1>TotoFra – Matchday</h1>

<div id="content"></div>

<script>
fetch("matchday.json")
    .then(r => r.json())
    .then(data => {
        let html = "";
        data.matches.forEach(m => {
          html += `
    <div class="match">
        <strong>${m.home} vs ${m.away}</strong><br>

        <div class="prob">
            1: ${m.prob_1}% – X: ${m.prob_x}% – 2: ${m.prob_2}%
        </div>

        <div class="prob" style="color:#0077cc; font-weight:bold;">
            MetLive: ${m.metlive_pick || "N/D"} (${m.metlive_security || "N/D"})
        </div>

        <div class="prob" style="color:#28a745; font-weight:bold;">
            TotoFra Score: ${m.totofra_score}/100
        </div>
    </div>
`;


        <!-- Grafico confronto -->
        <div style="margin-top:8px;">
            <div style="font-size:12px; color:#444;">Poisson vs MetLive</div>

            <div style="background:#ddd; height:8px; border-radius:4px; margin-top:4px;">
                <div style="
                    width:${m.poisson_selected || 0}%;
                    height:8px;
                    background:#4caf50;
                    border-radius:4px;">
                </div>
            </div>

            <div style="background:#ddd; height:8px; border-radius:4px; margin-top:4px;">
                <div style="
                    width:${parseInt(m.metlive_security) || 0}%;
                    height:8px;
                    background:#0077cc;
                    border-radius:4px;">
                </div>
            </div>
        </div>
    </div>
`;



        });
        document.getElementById("content").innerHTML = html;
    });
</script>

</body>
</html>
