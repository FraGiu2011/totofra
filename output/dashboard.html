<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TotoFra – Matchday (PRO)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #0078d4;
            color: white;
            padding: 12px;
            font-size: 16px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f0f8ff;
        }

        .pick-1 { color: #007700; font-weight: bold; }
        .pick-X { color: #aa7700; font-weight: bold; }
        .pick-2 { color: #bb0000; font-weight: bold; }

        .high { color: #007700; font-weight: bold; }
        .medium { color: #aa7700; font-weight: bold; }
        .low { color: #bb0000; font-weight: bold; }
    </style>
</head>

<body>

<h1>TotoFra – Matchday (PRO)</h1>

<table>
    <tr>
        <th>Casa</th>
        <th>Trasferta</th>
        <th>1</th>
        <th>X</th>
        <th>2</th>
        <th>Pick</th>
        <th>Sicurezza</th>
    </tr>

    <!--MATCH_TABLE-->

</table>

</body>
</html>
